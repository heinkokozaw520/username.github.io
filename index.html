<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    input[type="text"] {
      padding: 8px;
      width: 250px;
      font-size: 16px;
      margin-bottom: 15px;
    }
    .item {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>Fruit List</h2>
  
  <!-- 🔍 Search Bar -->
  <input type="text" id="search" placeholder="Search by name..." onkeyup="filterData()">

  <!-- Data container -->
  <div id="data">Loading...</div>

  <script>
    const url = "https://script.google.com/macros/s/AKfycbwT5Lu42hEyWqGygFLlU0036E1MhYwX-5asBZTnQb_L5yCutDooYrqOEHOZh2ehvmHw/exec"; // your GAS link
    let allData = []; // store all rows globally

    async function loadData() {
      const res = await fetch(url);
      allData = await res.json();
      displayData(allData);
    }

    function displayData(data) {
      const container = document.getElementById("data");
      if (data.length === 0) {
        container.innerHTML = "<p>No results found.</p>";
        return;
      }

      let html = "";
      data.forEach(r => {
        html += `
          <div class="item">
            <div>
            <b>Fruit :</b> ${r.Fruit}<br>
            <b>Type  :</b> ${r.Type}<br>
            <b>Total :</b> ${r.Total}
          </div><br>
        
            <button onclick="deleteRow(${r.Row})">Delete</button>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function filterData() {
      const searchTerm = document.getElementById("search").value.toLowerCase();
      const filtered = allData.filter(item => 
        item.Fruit.toLowerCase().includes(searchTerm)
      );
      displayData(filtered);
    }
     async function deleteRow(row) {
      if (!confirm("Are you sure you want to delete this row?")) return;

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ row })
      });
      const result = await res.json();
      if (result.success) {
        alert("Row deleted!");
        loadData(); // refresh list
      } else {
        alert("Failed to delete row: " + result.message);
      }
    }


    loadData();
  </script>
</body>
</html>
